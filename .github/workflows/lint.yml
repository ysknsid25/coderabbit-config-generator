name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js 22.x
        uses: actions/setup-node@v7
        with:
          node-version: 22.x
          cache: 'npm'
      - run: npm ci
      - name: Run Lint
        run: npm run lint
